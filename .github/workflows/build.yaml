name: Build Executables

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: 1. 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 3. 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 4. PyInstaller로 실행 파일 만들기 (Windows 용)
      run: pyinstaller --noconsole --onefile --name region-check-windows-v1.1.0 region-check-gui.py

    - name: 5. GitHub Release 생성 및 파일 업로드
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/region-check-windows-v1.1.0.exe
        tag_name: v1.1.0
        name: Release v1.1.0
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}